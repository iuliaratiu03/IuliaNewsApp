version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_DATABASE: iulia_news_db
      MYSQL_USER: iulia_user
      MYSQL_PASSWORD: iulia2026@
      MYSQL_ROOT_PASSWORD: iulia2026@
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data: